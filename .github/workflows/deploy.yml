# Deploy Duluka Studio to GitHub Pages
# เมื่อ push โค้ดขึ้น branch main → build เป็น static site → deploy ไป GitHub Pages อัตโนมัติ

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build static site
        # basePath ต้องตรงกับ URL GitHub Pages ทุกตัวอักษร
        # repo: Project → URL: scotcsduluka.github.io/Project → basePath: /Project
        env:
          BUILD_STATIC: "true"
          NEXT_PUBLIC_BASE_PATH: /Project
        run: bun run next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
